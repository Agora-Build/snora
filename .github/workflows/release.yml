name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker-release:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm-release:
    name: Package & Push Helm Chart
    runs-on: ubuntu-latest
    needs: docker-release
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Login to GHCR for Helm
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Sync chart version with git tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^version:.*/version: $VERSION/" charts/snora/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/snora/Chart.yaml

      - name: Package chart
        run: helm package charts/snora/

      - name: Push chart to GHCR
        run: |
          CHART_FILE=$(ls snora-*.tgz)
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          helm push "$CHART_FILE" oci://${{ env.REGISTRY }}/${OWNER}/charts

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [docker-release, helm-release]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "${{ github.ref_name }}" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          {
            echo "## What's Changed"
            echo ""
            git log --pretty=format:"- %s (%h)" "$PREV_TAG".."${{ github.ref_name }}"
            echo ""
            echo ""
            echo "## Docker"
            echo ""
            echo '```bash'
            echo "docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}"
            echo '```'
            echo ""
            echo "## Helm"
            echo ""
            echo '```bash'
            VERSION="${{ github.ref_name }}"
            OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
            echo "helm install snora oci://ghcr.io/${OWNER}/charts/snora --version ${VERSION#v}"
            echo '```'
          } > /tmp/changelog.md

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file /tmp/changelog.md
