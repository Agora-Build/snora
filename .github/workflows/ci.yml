name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-node:
    name: Lint (Node.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  test-node:
    name: Test (Node.js)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
        env:
          REDIS_URL: redis://localhost:6379

  lint-cpp:
    name: Lint (C++)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y clang-format
      - run: find engine/src -name '*.cpp' -o -name '*.h' | xargs clang-format --dry-run --Werror

  test-cpp:
    name: Test (C++ CPU mode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y cmake build-essential pkg-config libsndfile1-dev
      - run: cd engine && cmake -B build -DSNORA_CPU_MODE=ON && cmake --build build
      - run: cd engine/build && LD_LIBRARY_PATH=$PWD/../third_party/agora_rtc_sdk/agora_sdk ctest --output-on-failure

  lint-helm:
    name: Lint (Helm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint charts/snora/ --set secrets.apiKey=ci --set config.agoraAppId=ci

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint-node, test-node, test-cpp]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: snora:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
